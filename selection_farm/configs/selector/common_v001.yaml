config_id: common_v001
database:
  env_file: docker/.env
  host_env: POSTGRES_HOST
  port_env: POSTGRES_PORT
  name_env: POSTGRES_DB
  user_env: POSTGRES_USER
  password_env: POSTGRES_PASSWORD
timeouts:
  database_connect_seconds: 10.0
  operation_seconds: 120.0
batch:
  size: 25
export:
  atomic_replace: true
logging:
  level: INFO
  json_output: false
